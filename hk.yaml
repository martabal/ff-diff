x-steps:
  mise: &step-mise
    glob: ["mise.toml"]
    _type: step
    check: mise fmt --check
    fix: mise fmt
    depends: []
    env: {}

  typos: &step-typos
    glob: ["mise.lock"]
    _type: step
    check: typos .
    fix: typos --force-exclude --write-changes
    depends: []
    env: {}

  rumdl: &step-rumdl
    glob: ["**/*.md"]
    _type: step
    check: rumdl check
    fix: rumdl check --fix
    depends: []
    env: {}

  oxlint: &step-oxlint
    glob: ["**/*.ts", "package.json", "pnpm-lock.yaml"]
    _type: step
    check: pnpm run lint
    fix: pnpm run lint:fix
    output_summary: hide
    depends: []
    env: {}

  oxfmt: &step-oxfmt
    glob:
      [
        "**/*.js",
        "**/*.ts",
        "**/*.json",
        "**/*.yaml",
        "**/*.yml",
        "**/*.toml",
        "**/*.md",
        "package.json",
        "pnpm-lock.yaml",
      ]
    _type: step
    check: pnpm run format
    fix: pnpm run format:fix
    output_summary: hide
    depends: []
    env: {}

  check-ts: &step-check-ts
    glob: ["**/*.ts", "package.json", "pnpm-lock.yaml"]
    _type: step
    check: pnpm run check:typescript
    output_summary: hide
    depends: []
    env: {}

  tests: &step-tests
    glob: ["**/*.ts", "package.json", "pnpm-lock.yaml"]
    _type: step
    check: pnpm run test:all
    output_summary: hide
    depends: []
    env: {}

  tests-e2e: &step-tests-e2e
    glob: ["**/*.ts", "package.json", "pnpm-lock.yaml"]
    _type: step
    check: pnpm run test:all
    output_summary: hide
    depends: []
    env: {}

  actionlint: &step-actionlint
    glob: [".github/workflows/*.yml", ".github/workflows/*.yaml"]
    _type: step
    check: actionlint
    output_summary: hide
    depends: []
    env: {}

hooks:
  pre-commit:
    fix: true
    steps:
      mise: *step-mise
      typos: *step-typos
      rumdl: *step-rumdl
      oxlint: *step-oxlint
      oxfmt: *step-oxfmt
      check-ts: *step-check-ts
      tests: *step-tests
      tests-e2e: *step-tests-e2e
      actionlint: *step-actionlint
  fix:
    steps:
      mise: *step-mise
      typos: *step-typos
      rumdl: *step-rumdl
      oxlint: *step-oxlint
      oxfmt: *step-oxfmt
  check:
    steps:
      mise: *step-mise
      typos: *step-typos
      rumdl: *step-rumdl
      oxlint: *step-oxlint
      oxfmt: *step-oxfmt
      check-ts: *step-check-ts
      tests-e2e: *step-tests-e2e
      tests: *step-tests
      actionlint: *step-actionlint
